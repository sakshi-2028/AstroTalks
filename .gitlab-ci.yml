stages:
  - build
  - deploy

variables:
  APP_DIR: "/home/ubuntu/app"

build:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind

  script:
    - echo "🔨 Building Docker image..."
    - docker compose build

  only:
    - dev

deploy:
  stage: deploy
  image: amazon/aws-cli:2.15.0

  script:
    - echo "🚀 Deploy via SSM"

    - |
      aws ssm send-command \
        --instance-ids "$EC2_INSTANCE_ID" \
        --region "$AWS_REGION" \
        --document-name "AWS-RunShellScript" \
        --comment "Deploy AstroTalks" \
        --parameters '{
          "commands": [
            "cd /home/ubuntu/AstroTalks",
            "git pull origin dev",
            "docker compose down",
            "docker compose up -d --build"
          ]
        }'

    - echo "✅ Deployment triggered"